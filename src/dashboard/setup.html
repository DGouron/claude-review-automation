<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reviewflow — Setup Wizard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="setup-body">
  <main class="setup-shell" data-boot="pending">
    <span class="setup-corner setup-corner--tl" aria-hidden="true"></span>
    <span class="setup-corner setup-corner--tr" aria-hidden="true"></span>
    <span class="setup-corner setup-corner--bl" aria-hidden="true"></span>
    <span class="setup-corner setup-corner--br" aria-hidden="true"></span>

    <header class="setup-header">
      <div class="setup-boot" aria-hidden="true">
        <span class="setup-boot-bar"></span>
        <span class="setup-boot-bar"></span>
        <span class="setup-boot-bar"></span>
      </div>
      <div class="setup-title-block">
        <p class="setup-eyebrow">// REVIEWFLOW SETUP</p>
        <h1 id="setup-heading" class="setup-heading">// SÉQUENCE DE DÉMARRAGE</h1>
      </div>
    </header>

    <div id="setup-banners" class="setup-banners"></div>

    <div id="setup-disconnect" class="setup-disconnect" hidden role="alert">
      <span class="setup-banner-title">// CONNEXION PERDUE</span>
      <span class="setup-disconnect-detail">Lecture dégradée via interrogation périodique de l'état.</span>
      <a class="btn btn-secondary" href="/setup">Relancer le wizard</a>
    </div>

    <div id="setup-readonly" class="setup-readonly" hidden role="status"></div>

    <div id="setup-avatar" class="setup-avatar" hidden>
      <span class="setup-corner setup-corner--tl" aria-hidden="true"></span>
      <span class="setup-corner setup-corner--tr" aria-hidden="true"></span>
      <span class="setup-corner setup-corner--bl" aria-hidden="true"></span>
      <span class="setup-corner setup-corner--br" aria-hidden="true"></span>
      <canvas id="setup-avatar-canvas" class="setup-avatar-canvas" width="220" height="220" aria-hidden="true"></canvas>
      <div class="setup-avatar-side">
        <div id="setup-avatar-status" class="setup-avatar-status">// ÉTAT — INITIALISATION</div>
        <div id="setup-avatar-form" class="setup-avatar-form"></div>
      </div>
    </div>

    <ol id="setup-steps" class="setup-steps" aria-label="Étapes de configuration"></ol>

    <div id="setup-live" class="setup-visually-hidden" role="status" aria-live="polite" aria-atomic="true"></div>
  </main>

  <script type="module">
    import {
      buildStepRowsModel,
      buildBannerModel,
      renderStepRow,
      renderBanner,
      buildAriaAnnouncement,
    } from './modules/setupWizard.js';
    import {
      connectSetupWizardStream,
      pollingStateToEvents,
      buildMultiTabViewState,
      prefersReducedMotion,
    } from './modules/setupWizardStream.js';
    import {
      buildFormModel,
      renderForm,
      buildInputPayload,
    } from './modules/setupWizardForms.js';
    import {
      avatarStateFromEvents,
      shouldUseAvatar,
    } from './modules/setupWizardAvatar.js';
    import { mountSetupWizardAvatar } from './modules/setupWizardAvatarRenderer.js';

    const stepsContainer = document.getElementById('setup-steps');
    const bannersContainer = document.getElementById('setup-banners');
    const disconnectBanner = document.getElementById('setup-disconnect');
    const readOnlyBanner = document.getElementById('setup-readonly');
    const liveRegion = document.getElementById('setup-live');
    const shell = document.querySelector('.setup-shell');
    const headingElement = document.getElementById('setup-heading');
    const avatarContainer = document.getElementById('setup-avatar');
    const avatarCanvas = document.getElementById('setup-avatar-canvas');
    const avatarStatusSlot = document.getElementById('setup-avatar-status');
    const avatarFormSlot = document.getElementById('setup-avatar-form');

    const reducedMotion = prefersReducedMotion(
      typeof window.matchMedia === 'function'
        ? window.matchMedia('(prefers-reduced-motion: reduce)')
        : null,
    );
    if (reducedMotion) {
      shell.setAttribute('data-reduced-motion', 'true');
    }

    const canvasSupported =
      typeof document.createElement('canvas').getContext === 'function' &&
      document.createElement('canvas').getContext('2d') !== null;
    const useAvatar = shouldUseAvatar({ canvasSupported, reducedMotion });
    let avatar = null;

    let lastAnnouncedKey = '';
    let activeRunId = null;
    let activeRunReadOnly = false;

    function announce(rows) {
      const active = rows.find((row) => row.status === 'in_progress')
        ?? [...rows].reverse().find((row) => row.status !== 'pending');
      if (!active) {
        return;
      }
      const key = `${active.id}:${active.status}`;
      if (key === lastAnnouncedKey) {
        return;
      }
      lastAnnouncedKey = key;
      liveRegion.textContent = buildAriaAnnouncement(active);
    }

    function applyResumeHeading(banners) {
      const resume = banners.find((banner) => banner.kind === 'resume');
      if (resume && resume.position !== null && resume.total !== null) {
        headingElement.textContent = `// REPRISE — Étape ${resume.position}/${resume.total}`;
      }
    }

    function latestAwaitingInput(events) {
      const last = events[events.length - 1];
      return last && last.status === 'awaiting_input' ? last : null;
    }

    async function submitForm(form, model) {
      const errorSlot = form.querySelector('.setup-form-error');
      const raw = 'fixedValue' in model ? model.fixedValue : readFormValue(form, model.kind);
      const result = buildInputPayload(model.kind, activeRunId, raw, model.options);
      if (!result.ok) {
        showFormError(errorSlot, result.error);
        return;
      }
      try {
        const response = await fetch('/api/setup/input', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(result.body),
        });
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          showFormError(errorSlot, payload.error === 'no-active-run'
            ? '// SESSION EXPIRÉE — relancez le wizard'
            : '// ENTRÉE REFUSÉE par le serveur');
        }
      } catch {
        showFormError(errorSlot, '// ENVOI IMPOSSIBLE — vérifiez la connexion');
      }
    }

    function readFormValue(form, kind) {
      if (kind === 'text') {
        const input = form.querySelector('.setup-form-input');
        return input ? input.value : '';
      }
      if (kind === 'multiSelect') {
        return [...form.querySelectorAll('.setup-form-checkbox:checked')].map((box) => box.value);
      }
      return '';
    }

    function showFormError(slot, message) {
      if (!slot) {
        return;
      }
      slot.textContent = message;
      slot.hidden = false;
    }

    function bindForm(form, model) {
      form.addEventListener('submit', (formEvent) => {
        formEvent.preventDefault();
        submitForm(form, model);
      });
      for (const button of form.querySelectorAll('[data-confirm-value]')) {
        button.addEventListener('click', () => {
          submitForm(form, { ...model, fixedValue: button.dataset.confirmValue === 'true' });
        });
      }
      for (const button of form.querySelectorAll('[data-choice-value]')) {
        button.addEventListener('click', () => {
          submitForm(form, { ...model, fixedValue: button.dataset.choiceValue });
        });
      }
    }

    function renderActiveForm(events) {
      if (activeRunReadOnly || activeRunId === null) {
        return;
      }
      const awaiting = latestAwaitingInput(events);
      const model = buildFormModel(awaiting);
      if (model === null) {
        return;
      }
      const row = stepsContainer.querySelector(`[data-step-id="${model.stepId}"] .setup-step-body`);
      if (!row) {
        return;
      }
      row.insertAdjacentHTML('beforeend', renderForm(model));
      const form = row.querySelector('.setup-form');
      if (form) {
        bindForm(form, model);
      }
    }

    function renderAvatarForm(events) {
      const awaiting = latestAwaitingInput(events);
      const model = activeRunReadOnly || activeRunId === null ? null : buildFormModel(awaiting);
      if (model === null) {
        avatarFormSlot.innerHTML = '';
        return;
      }
      avatarFormSlot.innerHTML = renderForm(model);
      const form = avatarFormSlot.querySelector('.setup-form');
      if (form) {
        bindForm(form, model);
      }
    }

    function render(events) {
      const rows = buildStepRowsModel(events);
      const banners = buildBannerModel(events);
      stepsContainer.innerHTML = rows.map(renderStepRow).join('');
      bannersContainer.innerHTML = banners.map(renderBanner).join('');
      applyResumeHeading(banners);
      renderActiveForm(events);
      announce(rows);
    }

    function renderAvatar(events) {
      const rows = buildStepRowsModel(events);
      const banners = buildBannerModel(events);
      const state = avatarStateFromEvents(events);
      if (avatar) {
        avatar.setState(state);
      }
      avatarStatusSlot.textContent = `// ÉTAT — ${state.toUpperCase()}`;
      bannersContainer.innerHTML = banners.map(renderBanner).join('');
      applyResumeHeading(banners);
      renderAvatarForm(events);
      announce(rows);
    }

    const renderEvents = useAvatar ? renderAvatar : render;

    function showDisconnect() {
      disconnectBanner.hidden = false;
    }

    function showReadOnly(notice) {
      readOnlyBanner.hidden = false;
      readOnlyBanner.textContent = notice;
    }

    async function pollOnce() {
      try {
        const response = await fetch('/api/setup/state');
        if (!response.ok) {
          return;
        }
        const payload = await response.json();
        renderEvents(pollingStateToEvents(payload.state));
      } catch {
        /* polling is best-effort; the disconnect banner already informs the user */
      }
    }

    function startPolling() {
      showDisconnect();
      pollOnce();
      window.setInterval(pollOnce, 2000);
    }

    async function startRun() {
      const response = await fetch('/api/setup/start', { method: 'POST' });
      if (response.status === 409) {
        const body = await response.json();
        const viewState = buildMultiTabViewState({ isPrimaryTab: false, hasActiveRun: true });
        if (viewState.notice) {
          showReadOnly(viewState.notice);
        }
        subscribe(body.runId, true);
        return;
      }
      const body = await response.json();
      subscribe(body.runId, false);
    }

    function subscribe(runId, readOnly) {
      activeRunId = runId;
      activeRunReadOnly = readOnly;
      shell.setAttribute('data-boot', 'ready');
      connectSetupWizardStream({
        runId,
        onEvents: renderEvents,
        onDisconnected: () => {
          if (!readOnly) {
            startPolling();
          } else {
            pollOnce();
          }
        },
        onComplete: () => {
          window.setTimeout(() => {
            if (avatar) {
              avatar.destroy();
              avatar = null;
            }
            window.location.href = '/dashboard/';
          }, reducedMotion ? 0 : 3000);
        },
      });
    }

    window.addEventListener('storage', (event) => {
      if (event.key === 'reviewflow.setup.completed') {
        if (avatar) {
          avatar.destroy();
          avatar = null;
        }
        window.location.href = '/dashboard/';
      }
    });

    if (useAvatar) {
      avatarContainer.hidden = false;
      stepsContainer.hidden = true;
      avatar = mountSetupWizardAvatar({ canvas: avatarCanvas, initialState: 'idle' });
    }

    renderEvents([]);
    startRun();
  </script>
</body>
</html>
